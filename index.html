<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Ngọc Lê 🌸</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{

height:100vh;
overflow:hidden;

background:linear-gradient(135deg,#ffd6e8,#ffcce3,#fff4f9);

display:flex;
justify-content:center;
align-items:center;

color:white;

}

body::before{

content:"";
position:absolute;
inset:0;

background:
radial-gradient(circle at top,#ffffff55,transparent 60%);

}

.lock{

position:relative;
z-index:5;
text-align:center;
width:100%;

}

.time{

font-size:70px;
font-weight:300;
text-shadow:0 5px 15px rgba(0,0,0,.15);

}

.date{

margin-top:8px;
font-size:20px;

}

.card{

margin:30px auto;

width:340px;

padding:28px;

border-radius:30px;

background:rgba(255,255,255,.22);

backdrop-filter:blur(18px);

box-shadow:0 10px 40px rgba(0,0,0,.18);

}

.avatar{

width:180px;
height:180px;

margin:18px auto;

display:block;

object-fit:cover;

border-radius:50%;

border:5px solid rgba(255,255,255,.8);

box-shadow:0 8px 30px rgba(0,0,0,.25);

animation:float 3s ease-in-out infinite;

}

h2{

margin-top:10px;
font-size:34px;

}

p{

margin-top:18px;

font-size:18px;

line-height:1.7;

}

button{

margin-top:25px;

padding:14px 35px;

border:none;

border-radius:50px;

font-size:18px;

font-weight:bold;

cursor:pointer;

background:white;

color:#ff4f91;

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

#msg{

margin-top:18px;

font-size:20px;

min-height:55px;

}

.float{

position:absolute;

pointer-events:none;

animation:fly linear forwards;

}

@keyframes fly{

from{

transform:translateY(0) scale(.5);

opacity:1;

}

to{

transform:translateY(-120vh) rotate(360deg) scale(2);

opacity:0;

}

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-10px);

}

}

</style>

</head>

<body>

<div class="lock">

<div class="time" id="time"></div>

<div class="date" id="date"></div>

<div class="card">

<img src="ngocle.png" class="avatar">

<h2>🌸 Ngọc Lê 🌸</h2>

<p>

Chúc Ngọc Lê luôn vui vẻ 🌷

Mỗi ngày đều có thật nhiều tiếng cười ✨

</p>

<button onclick="showWish()">

🌸 Chạm thử nè

</button>

<div id="msg"></div>

</div>

</div>

<script>

function updateClock(){

const now=new Date();

document.getElementById("time").innerHTML=

String(now.getHours()).padStart(2,"0")+":"+

String(now.getMinutes()).padStart(2,"0");

const days=[

"Chủ nhật",

"Thứ Hai",

"Thứ Ba",

"Thứ Tư",

"Thứ Năm",

"Thứ Sáu",

"Thứ Bảy"

];

document.getElementById("date").innerHTML=

days[now.getDay()]+" • "+

now.getDate()+"/"+(now.getMonth()+1)+"/"+now.getFullYear();

}

setInterval(updateClock,1000);

updateClock();

const wishes=[

"🌸 Chúc Ngọc Lê luôn mỉm cười.",

"🌷 Chúc hôm nay thật nhiều niềm vui.",

"✨ Mong mọi điều tốt đẹp sẽ đến.",

"😊 Hãy luôn giữ nụ cười nhé.",

"🩷 Chúc một ngày thật nhẹ nhàng.",

"🌼 Smileeeee 😄"

];

function showWish(){

document.getElementById("msg").innerHTML=

wishes[Math.floor(Math.random()*wishes.length)];

for(let i=0;i<80;i++){

let e=document.createElement("div");

e.className="float";

e.innerHTML=["🌸","🩷","✨","💖","🌷"][Math.floor(Math.random()*5)];

e.style.left=Math.random()*100+"vw";

e.style.top="100vh";

e.style.fontSize=(18+Math.random()*25)+"px";

e.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(e);

setTimeout(()=>{

e.remove();

},6000);

}

}

setInterval(()=>{

let e=document.createElement("div");

e.className="float";

e.innerHTML=["🌸","✨","🩷"][Math.floor(Math.random()*3)];

e.style.left=Math.random()*100+"vw";

e.style.top="100vh";

e.style.fontSize=(16+Math.random()*18)+"px";

e.style.animationDuration="7s";

document.body.appendChild(e);

setTimeout(()=>{

e.remove();

},7000);

},500);

document.addEventListener("click",(ev)=>{

for(let i=0;i<18;i++){

let e=document.createElement("div");

e.className="float";

e.innerHTML="🌸";

e.style.left=(ev.clientX+(Math.random()-0.5)*100)+"px";

e.style.top=(ev.clientY+(Math.random()-0.5)*100)+"px";

e.style.fontSize=(16+Math.random()*20)+"px";

e.style.animationDuration="3s";

document.body.appendChild(e);

setTimeout(()=>{

e.remove();

},3000);

}

});

</script>

</body>
</html>
