<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Ngọc Lê ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(160deg,#ff6fa5,#ff8fc0,#ffd9ea);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.bg{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at top,#ffffff30,transparent 60%);
}

.lock{
    text-align:center;
    z-index:10;
}

.time{
    font-size:78px;
    font-weight:300;
}

.date{
    font-size:20px;
    margin-top:5px;
}

.card{
    margin-top:40px;
    width:330px;
    padding:28px;
    border-radius:28px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(18px);
    box-shadow:0 10px 40px rgba(0,0,0,.2);
}

.card h2{
    font-size:34px;
    margin-bottom:15px;
}

.card p{
    line-height:1.7;
    font-size:18px;
}

button{
    margin-top:25px;
    border:none;
    border-radius:50px;
    padding:14px 35px;
    background:white;
    color:#ff4d88;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

#msg{
    margin-top:18px;
    min-height:55px;
    font-size:20px;
}

.heart{
    position:absolute;
    pointer-events:none;
    animation:fly linear forwards;
}

@keyframes fly{
    from{
        transform:translateY(0) scale(.5);
        opacity:1;
    }
    to{
        transform:translateY(-120vh) rotate(360deg) scale(2);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="lock">

<div class="time" id="time"></div>
<div class="date" id="date"></div>

<div class="card">

<h2>❤️ Ngọc Lê ❤️</h2>

<p>
Nếu gặp em là một điều may mắn,<br>
thì yêu em là điều anh muốn làm mỗi ngày. 💖
</p>

<button onclick="love()">Bấm vào đây</button>

<div id="msg"></div>

</div>

</div>

<script>

function updateClock(){

const now=new Date();

document.getElementById("time").innerHTML=
String(now.getHours()).padStart(2,'0')+":"+
String(now.getMinutes()).padStart(2,'0');

const days=["Chủ nhật","Thứ Hai","Thứ Ba","Thứ Tư","Thứ Năm","Thứ Sáu","Thứ Bảy"];

document.getElementById("date").innerHTML=
days[now.getDay()]+" • "+
now.getDate()+"/"+(now.getMonth()+1)+"/"+now.getFullYear();

}

setInterval(updateClock,1000);
updateClock();

const texts=[
"Ngọc Lê ❤️ Anh yêu em.",
"Mỗi ngày đều muốn ở bên em. 💕",
"Em là điều tuyệt vời nhất. 🌹",
"Anh sẽ luôn nắm tay em. 🥰",
"Cảm ơn em đã xuất hiện trong cuộc đời anh. 💖",
"Yêu Ngọc Lê hôm nay và mãi mãi. ❤️"
];

function love(){

document.getElementById("msg").innerHTML=
texts[Math.floor(Math.random()*texts.length)];

for(let i=0;i<80;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML=["❤️","💖","💕","💘","🌸"][Math.floor(Math.random()*5)];

h.style.left=Math.random()*100+"vw";
h.style.top="100vh";
h.style.fontSize=(18+Math.random()*30)+"px";
h.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

}

}

document.body.addEventListener("click",(e)=>{

for(let i=0;i<20;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=(e.clientX+(Math.random()-0.5)*120)+"px";
h.style.top=(e.clientY+(Math.random()-0.5)*120)+"px";
h.style.fontSize=(18+Math.random()*20)+"px";
h.style.animationDuration=(2+Math.random()*2)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),4000);

}

});

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="💖";

h.style.left=Math.random()*100+"vw";
h.style.top="100vh";
h.style.fontSize=(18+Math.random()*20)+"px";
h.style.animationDuration="6s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

},350);

</script>

</body>
</html>
